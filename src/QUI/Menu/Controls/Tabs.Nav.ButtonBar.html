<div class="quiqqer-tabsAdvanced-nav quiqqer-tabsAdvanced-nav--buttonBar {$navAlignment}">
    <ul class="quiqqer-tabsAdvanced-nav-inner quiqqer-tabsAdvanced-nav-inner--buttonBar {$navFillSpace} quiqqer-tab-nav"
        data-name="nav"
        role="tablist">
        {foreach from=$entries item=entry key=key}
            {if !isset($entry.tabTitle) || !$entry.tabTitle}
                {continue}
            {/if}
            <li class="quiqqer-tabsAdvanced-nav-item quiqqer-tabsAdvanced-nav-item--buttonBar {$navTabStyleCss}
             quiqqer-tab-nav-item {if $key == $active - 1}active{/if}"
                data-name="nav-item"
                role="presentation"
                data-entry-nav-pos="{$key}"
                {if isset($entry.accentColor) && $entry.accentColor}style="--_qui-menu-controls-tabs-accentColor: {$entry.accentColor};"{/if}
            >
                <a href="#{QUI\Utils\Security\Orthos::urlEncodeString($entry.tabTitle)}"
                   data-qui-disableTemplateScroll="1"
                   class="quiqqer-tabsAdvanced-nav-link quiqqer-tabsAdvanced-nav-link--buttonBar {$navTabStyleCss} btn"
                   data-name="nav-link"
                   draggable="false"
                   role="tab"
                   id="{$instanceId}-tab-{$key}"
                   aria-controls="{QUI\Utils\Security\Orthos::urlEncodeString($entry.tabTitle)}"
                   aria-selected="{if $key == $active - 1}true{else}false{/if}"
                   tabindex="{if $key == $active - 1}0{else}-1{/if}">
                    <span class="quiqqer-tabsAdvanced-nav-linkContent quiqqer-tabsAdvanced-nav-linkContent--buttonBar {$navTabStyleCss}">
                        {if isset($entry.tabIcon) && $entry.tabIcon}
                            <span class="quiqqer-tabsAdvanced-nav-visual quiqqer-tabsAdvanced-nav-visual--buttonBar">
                                {image src=$entry.tabIcon width="80" height="80"}
                            </span>
                        {/if}

                        {if $showNavText}
                            <span class="quiqqer-tabsAdvanced-nav-linkLabel quiqqer-tabsAdvanced-nav-linkLabel--buttonBar {$navTabStyleCss} {$navWrapText}"
                                  data-name="nav-label">
                                {$entry.tabTitle}
                            </span>
                        {/if}
                    </span>

                    <span class="quiqqer-tabsAdvanced-progress quiqqer-tabsAdvanced-progress--buttonBar"
                          data-name="progress">
                        <span class="quiqqer-tabsAdvanced-progress__bar" data-name="progress-bar"></span>
                    </span>
                </a>
            </li>
        {/foreach}
    </ul>

    <!-- Live-Region for screen reader announcements -->
    <div class="visually-hidden" data-name="live-region" aria-live="polite" aria-atomic="true"></div>
</div>
